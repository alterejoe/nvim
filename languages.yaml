# languages.yaml
#
# Each language entry supports these top-level keys:
#
#   mason:      list of mason packages to install
#   lsp:        LSP server configuration
#     server:     server name (required)
#     cmd:        optional command override
#     filetypes:  optional filetype list
#     settings:   optional server settings table
#   formatter:  string or list of conform formatter names
#   treesitter: grammar name (string) or list of grammar names
#   blink:      (optional) blink.cmp source overrides for this filetype
#     sources:       fully replace default sources  [lsp, path, snippets, buffer]
#     extra_sources: prepend extra sources in front of defaults
#   extras:     miscellaneous extra config
#     filetype_register:
#       extension:  file extension to register
#       name:       filetype name
#     additional_servers: list of extra LSP servers to enable alongside the primary
#       - server:   server name
#         filetypes: ...
#         settings:  ...

languages:
  python:
    mason:
      - pyright
      - black
    lsp:
      server: pyright
    formatter: black
    treesitter: python
  lua:
    mason:
      - lua-language-server
      - stylua
    lsp:
      server: lua_ls
      settings:
        Lua:
          completion:
            callSnippet: Replace
          diagnostics:
            globals: ["vim"]
    formatter: stylua
    treesitter: lua
  go:
    mason:
      - gopls
      - goimports
    lsp:
      server: gopls
    formatter: [goimports, gofmt]
    treesitter: go
  javascript:
    mason:
      - typescript-language-server
      - biome
    lsp:
      server: ts_ls
      filetypes: ["javascript", "javascriptreact"]
    formatter: biome
    treesitter: javascript
  typescript:
    mason:
      - typescript-language-server
      - prettierd
    lsp:
      server: ts_ls
      filetypes: ["typescript", "typescriptreact"]
    formatter: prettierd
    treesitter: typescript
  html:
    mason:
      - html-lsp
      - prettierd
      - emmet-language-server
    lsp:
      server: html
      filetypes: ["html", "template"]
    formatter: prettierd
    treesitter: html
    extras:
      additional_servers:
        - server: emmet_language_server
          filetypes: ["html", "templ"]
  css:
    mason:
      - css-lsp
      - prettierd
    lsp:
      server: cssls
    formatter: prettierd
    treesitter: css
  json:
    mason:
      - prettierd
    formatter: prettierd
    treesitter: json
  yaml:
    mason:
      - prettierd
    formatter: prettierd
    treesitter: yaml
  toml:
    mason:
      - taplo
    formatter: taplo
    treesitter: toml
  sql:
    mason:
      - postgres-language-server
      - pg_format
    lsp:
      server: postgres_lsp
      filetypes: ["sql"]
    formatter: pg_format
    treesitter: sql
  hcl:
    mason:
      - terraform-ls
    lsp:
      server: terraformls
      filetypes: ["hcl"]
    formatter: hcl
    treesitter: hcl
  terraform:
    mason:
      - terraform-ls
    lsp:
      server: terraformls
      filetypes: ["terraform", "tf"]
    treesitter: hcl
  templ:
    mason:
      - templ
      - tailwindcss-language-server
    lsp:
      server: templ
      cmd: ["templ", "lsp"]
      filetypes: ["templ"]
    formatter: templ
    treesitter: templ
    extras:
      filetype_register:
        extension: templ
        name: templ
      additional_servers:
        - server: tailwindcss
          filetypes: ["templ"]
          settings:
            tailwindCSS:
              classAttributes: ["class"]
              experimental:
                classRegex:
                  - "(?<=class=[\"'`])[^\"'`\\s]+"
  gdscript:
    mason:
      - gdtoolkit
    formatter: gdformat
    treesitter: gdscript
